<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>地球四季演示 - Zorro's Space</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌍</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: -apple-system, 'Noto Sans SC', sans-serif; background: #000; color: #fff; touch-action: none; }
        #canvas-container { width: 100vw; height: 100vh; cursor: grab; }
        #canvas-container:active { cursor: grabbing; }
        
        .toolbar { position: fixed; top: 12px; left: 12px; z-index: 20; display: flex; flex-direction: column; gap: 8px; }
        .toolbar-row { display: flex; gap: 8px; }
        .toolbar-btn { padding: 8px 14px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.15); border-radius: 18px; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 13px; cursor: pointer; }
        .toolbar-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .toolbar-btn.active { background: rgba(255,215,0,0.3); color: #FFD700; border-color: #FFD700; }
        
        #time-panel { background: rgba(8,10,20,0.85); border-radius: 12px; padding: 8px 14px; }
        #sim-time { font-size: 16px; font-weight: 600; color: #FFD700; }
        #sim-date { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 2px; }
        
        #info-panel { background: rgba(8,10,20,0.85); border-radius: 12px; padding: 10px 14px; margin-top: 8px; }
        #info-panel h3 { font-size: 13px; color: #FFD700; margin-bottom: 8px; }
        .stat { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 11px; }
        .stat:last-child { border-bottom: none; }
        .stat-label { color: rgba(255,255,255,0.5); }
        .stat-value { color: #FFD700; font-weight: 500; }
        
        #time-adjust { position: fixed; top: 180px; left: 12px; background: rgba(8,10,20,0.9); border-radius: 12px; padding: 12px 16px; z-index: 20; display: none; flex-direction: column; gap: 10px; min-width: 200px; }
        #time-adjust.show { display: flex; }
        .time-row { display: flex; align-items: center; gap: 6px; justify-content: flex-start; }
        .time-row label { color: rgba(255,255,255,0.6); font-size: 12px; min-width: 24px; }
        .time-row input { width: 50px; padding: 4px 6px; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; background: rgba(0,0,0,0.3); color: #fff; font-size: 14px; text-align: center; }
        .time-row input:focus { outline: none; border-color: #FFD700; }
        #apply-time { padding: 6px 16px; background: #FFD700; border: none; border-radius: 6px; color: #000; font-size: 12px; cursor: pointer; margin-top: 4px; font-weight: 600; }
        
        #controls { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); background: rgba(8,10,20,0.85); padding: 12px 20px; border-radius: 24px; z-index: 10; display: flex; align-items: center; gap: 12px; }
        #speed-label { font-size: 12px; color: rgba(255,255,255,0.6); min-width: 50px; }
        #speed-value { font-size: 14px; font-weight: 600; color: #FFD700; min-width: 70px; text-align: center; }
        #speed-slider { width: 150px; height: 6px; -webkit-appearance: none; background: rgba(255,255,255,0.15); border-radius: 3px; outline: none; }
        #speed-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #FFD700; cursor: pointer; }
        #pause-btn { padding: 8px 16px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; border-radius: 8px; cursor: pointer; font-size: 13px; }
        
        .hint { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.3); font-size: 11px; z-index: 10; pointer-events: none; }
        .key-hints { position: fixed; bottom: 8px; left: 8px; color: rgba(255,255,255,0.3); font-size: 10px; z-index: 5; }
        
        @media (max-width: 600px) {
            .toolbar { top: 8px; left: 8px; gap: 6px; }
            .toolbar-btn { padding: 6px 10px; font-size: 11px; }
            #time-panel { padding: 6px 10px; }
            #sim-time { font-size: 14px; }
            #time-adjust { top: 150px; left: 8px; min-width: 180px; }
            #controls { padding: 10px 14px; }
            #speed-slider { width: 100px; }
            .hint { bottom: 60px; font-size: 10px; }
            .key-hints { display: none; }
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="toolbar-row">
            <a href="/" class="toolbar-btn">← 返回</a>
            <button id="adjust-btn" class="toolbar-btn">📅 调整</button>
            <button id="reset-btn" class="toolbar-btn">🔄 当前</button>
        </div>
        <div id="time-panel">
            <div id="sim-time">00:00:00</div>
            <div id="sim-date">2026-01-01</div>
        </div>
        <div id="info-panel">
            <h3>🌍 四季信息</h3>
            <div class="stat"><span class="stat-label">当前视角</span><span class="stat-value" id="view-mode">太阳视角</span></div>
            <div class="stat"><span class="stat-label">北半球季节</span><span class="stat-value" id="season-name">春季</span></div>
            <div class="stat"><span class="stat-label">当前节气</span><span class="stat-value" id="solar-term">春分</span></div>
            <div class="stat"><span class="stat-label">轨道角度</span><span class="stat-value" id="orbit-angle">0°</span></div>
            <div class="stat"><span class="stat-label">直射纬度</span><span class="stat-value" id="sun-latitude">0°</span></div>
            <div class="stat"><span class="stat-label">北京昼长</span><span class="stat-value" id="day-length">--</span></div>
            <div class="stat"><span class="stat-label">日出(北京)</span><span class="stat-value" id="sunrise">--</span></div>
            <div class="stat"><span class="stat-label">日落(北京)</span><span class="stat-value" id="sunset">--</span></div>
            <div class="stat"><span class="stat-label">月相</span><span class="stat-value" id="moon-phase">新月</span></div>
        </div>
    </div>

    <div id="time-adjust">
        <div class="time-row">
            <label>年</label><input type="number" id="year-input" min="2000" max="2100">
            <label>月</label><input type="number" id="month-input" min="1" max="12">
            <label>日</label><input type="number" id="day-input" min="1" max="31">
        </div>
        <div class="time-row">
            <label>时</label><input type="number" id="hour-input" min="0" max="23">
            <label>分</label><input type="number" id="minute-input" min="0" max="59">
            <label>秒</label><input type="number" id="second-input" min="0" max="59">
        </div>
        <button id="apply-time">应用时间</button>
    </div>

    <div id="canvas-container"></div>
    <div class="hint">点击节气标签跳转 · 拖动旋转 · 双指缩放 · 空格暂停</div>

    <div id="controls">
        <span id="speed-label">速率</span>
        <input type="range" id="speed-slider" min="0" max="9" step="1" value="0">
        <span id="speed-value">1秒=1秒</span>
        <button id="pause-btn">⏸ 暂停</button>
    </div>

    <div class="key-hints">空格:暂停 | ←→:切换档位 | R:当前时间</div>

    <script src="lib/three.min.js"></script>
    <script src="lib/OrbitControls.js"></script>
    <script src="js/seasons.js?v=3.0.0"></script>
</body>
</html>>
